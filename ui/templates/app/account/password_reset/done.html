{% extends 'layouts/auth_layout.html' %}

{% block title %}Хабарлама жіберілді{% endblock title %}

{% block auth_layout %}
<div class="grid gap-8 text-center">
    <div class="grid gap-3">
        <h1 class="text-xl md:text-2xl font-black">Сілтеме жіберілді</h1>
        <p class="text-muted">
            Егер бұл email біздің жүйеде тіркелген болса, құпиясөзді қалпына келтіру сілтемесі жіберілді.
        </p>
    </div>

    <a href="{% url 'login' %}"
        class="w-full flex justify-center focus:outline-none transition-all text-white bg-primary-600 hover:bg-primary-800 focus:ring-3 focus:ring-primary-300 font-medium rounded-full px-4 py-2.5">
        Жүйеге кіру
    </a>
</div>
{% endblock auth_layout %}
