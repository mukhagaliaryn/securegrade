{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="w-full min-h-screen overflow-auto flex items-center justify-center py-8 px-4 sm:px-0 sm:py-16 bg-background">
    <div class="max-w-md w-full grid gap-4">
        <div class="relative">
            <a 
                href="{% url 'main' %}"
                class="w-64 mx-auto overflow-hidden block"    
            >
                <img src="{% static 'images/logo.svg' %}" alt="Logo" class="w-full">
            </a>
        </div>

        <div class="relative">
            {% block auth_layout %}
            {% endblock auth_layout %}
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const wrappers = document.querySelectorAll('[data-password-toggle]');

        wrappers.forEach((wrapper) => {
            const input = wrapper.querySelector('input');
            const button = wrapper.querySelector('[data-toggle-btn]');
            const eyeOpen = wrapper.querySelector('[data-eye-open]');
            const eyeClosed = wrapper.querySelector('[data-eye-closed]');

            if (!input || !button) return;

            const syncIcons = () => {
                const isPassword = input.type === 'password';

                if (eyeOpen) {
                    eyeOpen.classList.toggle('hidden', !isPassword);
                }
                if (eyeClosed) {
                    eyeClosed.classList.toggle('hidden', isPassword);
                }
            };

            button.addEventListener('click', function () {
                input.type = input.type === 'password' ? 'text' : 'password';
                syncIcons();
            });

            syncIcons();
        });
    });
</script>
{% endblock %}
