<button 
    data-modal-target="popup-modal" 
    data-modal-toggle="popup-modal"
    class="inline-flex items-center justify-center gap-2 rounded-2xl bg-primary-600 text-white px-6 py-3 font-semibold hover:bg-primary-700 focus:outline-none focus:ring-4 focus:ring-primary-300 transition-all shadow-sm"
    type="button"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
    </svg>
    <span>Сабақты аяқтау</span>
</button>

<div 
    id="popup-modal" 
    tabindex="-1"
    class="hidden fixed z-[9999] flex justify-center items-center w-full p-4 overflow-x-hidden overflow-y-auto bg-slate-900/60 backdrop-blur-sm md:inset-0"
>
    <div class="relative w-full max-w-md">
        <div class="relative overflow-hidden rounded-[28px] border border-border-200 bg-white shadow-2xl">

            <!-- Close -->
            <button
                type="button"
                class="absolute top-4 right-4 z-10 inline-flex items-center justify-center w-10 h-10 rounded-2xl text-muted hover:text-foreground hover:bg-secondary-100 transition-all"
                data-modal-hide="popup-modal"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
                <span class="sr-only">Close modal</span>
            </button>

            <!-- Content -->
            <div class="p-6 md:p-7 grid gap-6 text-center">
                <div class="grid gap-4">
                    <div class="w-16 h-16 rounded-3xl bg-amber-50 text-amber-600 flex items-center justify-center mx-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
                        </svg>
                    </div>

                    <div class="grid gap-2">
                        <h3 class="text-xl font-bold text-foreground">
                            Сабақты аяқтау
                        </h3>
                        <p class="text-sm md:text-base text-muted max-w-sm mx-auto leading-6">
                            Сабақты аяқтағаннан кейін нәтиже сақталады және жалпы қорытынды есептеледі.
                        </p>
                    </div>
                </div>

                <div class="rounded-2xl bg-secondary-50 border border-border-200 px-4 py-4 text-left">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-2xl bg-white border border-border-200 flex items-center justify-center shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 3h20" />
                                <path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3" />
                                <path d="m7 21 5-5 5 5" />
                            </svg>
                        </div>

                        <div class="grid gap-1 min-w-0">
                            <span class="text-xs text-muted">Сабақ</span>
                            <h4 class="font-semibold line-clamp-2">
                                {{ user_lesson.lesson.order }}-сабақ: {{ user_lesson.lesson.title }}
                            </h4>
                        </div>
                    </div>
                </div>

                <form 
                    action="{% url 'lesson_finish_handler' subject_id=user_subject.id chapter_id=user_chapter.id lesson_id=user_lesson.id %}" 
                    method="post" 
                    class="grid sm:grid-cols-2 gap-3"
                >
                    {% csrf_token %}

                    <button
                        type="submit"
                        class="inline-flex items-center justify-center gap-2 rounded-2xl bg-primary-600 text-white px-5 py-3 font-semibold hover:bg-primary-700 focus:outline-none focus:ring-4 focus:ring-primary-300 transition-all"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528" />
                        </svg>
                        <span>Иә, аяқтаймын</span>
                    </button>

                    <button 
                        data-modal-hide="popup-modal" 
                        type="button"
                        class="inline-flex items-center justify-center gap-2 rounded-2xl border border-border-200 bg-white px-5 py-3 font-semibold hover:bg-secondary-100 focus:outline-none focus:ring-4 focus:ring-secondary-300 transition-all"
                    >
                        <span>Жоқ, қайта оралу</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
